---
- name: Install Docker and Kubernetes on all k8s nodes
  hosts: all
  become: yes

  tasks:
    # ------------------
    # Update and install Docker
    # ------------------
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ------------------
    # Disable swap
    # ------------------
    - name: Disable swap
      command: swapoff -a
      ignore_errors: yes

    - name: Comment swap entry in /etc/fstab
      replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'
    # ------------------
    # Kubernetes networking requirements
    # ------------------

    - name: Load br_netfilter module
      command: modprobe br_netfilter

    - name: Ensure br_netfilter loads on boot
      copy:
        dest: /etc/modules-load.d/k8s.conf
        content: br_netfilter

    - name: Set Kubernetes sysctl parameters
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl settings
      command: sysctl --system
     
    # ------------------
    # Kubernetes repository setup
    # ------------------
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Kubernetes apt key
      shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.29/deb/Release.key | tee /etc/apt/keyrings/kubernetes-apt-keyring.asc
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.asc

    - name: Add Kubernetes apt repository
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v1.29/deb/ /"
        state: present
        filename: kubernetes

    - name: Update apt cache after adding repo
      apt:
        update_cache: yes

    # ------------------
    # Install Kubernetes packages
    # ------------------
    - name: Install kubelet, kubeadm, kubectl
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: yes
        state: started